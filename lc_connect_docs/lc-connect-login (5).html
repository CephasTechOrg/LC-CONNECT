<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LC Connect — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4f8fc2;
      --primary-dark: #3e7eb4;
      --text: #111827;
      --border: #dfe6ee;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at center, #ffffff 0%, #f0f0f0 60%, #e2e2e2 100%);
      font-family: "DM Sans", system-ui, sans-serif;
      color: var(--text);
    }

    /* ── PHONE SHELL ── */
    .phone {
      width: min(430px, 94vw);
      aspect-ratio: 430 / 932;
      position: relative;
      border: 11px solid #0c0d0f;
      border-radius: 54px;
      background: #0c0d0f;
      box-shadow: 0 30px 80px rgba(0,0,0,.30), inset 0 0 0 1px rgba(255,255,255,.15);
      overflow: hidden;
    }
    .screen {
      position: absolute;
      inset: 0;
      border-radius: 42px;
      background: #fff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── STATUS BAR ── */
    .status-bar {
      flex: 0 0 48px;
      padding: 13px 26px 0 30px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      font-weight: 700;
      font-size: 16px;
      color: #050505;
      position: relative;
      z-index: 30;
      background: #fff;
    }
    .dynamic-island {
      position: absolute;
      left: 50%; top: 8px;
      transform: translateX(-50%);
      width: 126px; height: 36px;
      border-radius: 999px;
      background: #050505;
    }
    .status-icons { display: flex; align-items: center; gap: 7px; }
    .signal { display: flex; align-items: flex-end; gap: 2px; height: 14px; }
    .signal span { width: 3px; background: #0b0b0b; border-radius: 3px; display: block; }
    .signal span:nth-child(1) { height: 5px; }
    .signal span:nth-child(2) { height: 8px; }
    .signal span:nth-child(3) { height: 11px; }
    .signal span:nth-child(4) { height: 14px; }
    .wifi { width: 17px; height: 13px; position: relative; }
    .wifi:before, .wifi:after { content:""; position:absolute; left:50%; transform:translateX(-50%); border:2px solid #0b0b0b; border-color:#0b0b0b transparent transparent transparent; border-radius:50%; }
    .wifi:before { width:18px; height:18px; top:0; }
    .wifi:after { width:10px; height:10px; top:5px; }
    .battery { width: 24px; height: 12px; border: 2px solid #0b0b0b; border-radius: 4px; position: relative; }
    .battery:before { content:""; position:absolute; right:-5px; top:3px; width:3px; height:5px; background:#0b0b0b; border-radius:0 2px 2px 0; }
    .battery:after { content:""; position:absolute; left:2px; top:2px; height:4px; width:14px; background:#0b0b0b; border-radius:2px; }

    /* ── SCROLL AREA ── */
    .content {
      flex: 1 1 auto;
      overflow-y: auto;
      scrollbar-width: none;
      background: #fff;
    }
    .content::-webkit-scrollbar { display: none; }

    /* ── BRAND ── */
    .brand {
      padding: 26px 28px 0;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: #fff;
    }
    .logo {
      width: 60px; height: 60px;
      border-radius: 17px;
      background: linear-gradient(145deg, #74a5c8, #5f93bf);
      display: grid; place-items: center;
      flex: 0 0 auto;
      box-shadow: 0 8px 18px rgba(79,143,194,.22);
      color: white;
      font-family: Georgia, serif;
      font-size: 32px;
      letter-spacing: -4px;
    }
    .brand-text h1 {
      margin: 0;
      font-size: clamp(34px, 9vw, 46px);
      line-height: .98;
      letter-spacing: -2.5px;
      font-weight: 800;
      white-space: nowrap;
    }
    .brand-text .blue { color: #4f8fc2; }
    .brand-text p {
      margin: 10px 0 0;
      font-size: 16px;
      line-height: 1.35;
      color: #565c66;
      font-weight: 400;
    }

    /* ── HERO ── */
    /*
      The hero is a fixed-height zone. Both images are absolutely positioned.
      School: covers the full zone as a background (we lighten it with opacity).
      Students: the cropped image is ~1024x910 (roughly square-ish),
        so we set width:100% and let height be auto — this fills the
        full width of the phone and shows the complete group from head to waist.
        We anchor it to the bottom so the white curve hides their feet naturally.
    */
    .hero-scene {
      position: relative;
      height: 360px;       /* taller zone = full heads visible */
      margin-top: 10px;
      overflow: hidden;
      background: #fff;
    }

    /* School building: fill the full zone */
    .school-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      opacity: 0.45;
      z-index: 1;
    }

    /* Students: anchored to bottom, full width — heads now fully in frame */
    .students-img {
      position: absolute;
      bottom: -45px;
      left: 0;
      width: 100%;
      height: auto;
      object-fit: contain;
      object-position: center bottom;
      z-index: 3;
    }

    /* White ellipse fading into form section */
    .hero-curve {
      position: absolute;
      z-index: 5;
      left: -8%; right: -8%;
      bottom: -45px;
      height: 90px;
      background: #fff;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }

    /* ── FORM ── */
    .form-wrap {
      padding: 10px 28px 28px;
      background: #fff;
      position: relative;
      z-index: 10;
    }
    .field {
      height: 56px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 15px;
      margin-bottom: 13px;
      box-shadow: 0 6px 16px rgba(15,23,42,.05);
    }
    .field svg { width: 22px; height: 22px; color: #1f2937; flex: 0 0 auto; }
    .field span { color: #8b91a0; font-size: 16.5px; }
    .field .eye { margin-left: auto; color: #7b8494; }
    .forgot {
      text-align: right; color: #3e80ba;
      font-size: 14px; font-weight: 500;
      margin: 0 0 18px;
    }
    .primary-btn {
      height: 56px; width: 100%; border: 0;
      border-radius: 13px;
      background: linear-gradient(180deg, #5a94c2, #3e7eb4);
      color: #fff; font-family: inherit;
      font-size: 18px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      gap: 12px;
      box-shadow: 0 10px 24px rgba(63,127,181,.34);
      cursor: pointer;
    }
    .primary-btn svg { width: 20px; height: 20px; }
    .divider {
      display: flex; align-items: center;
      gap: 16px; color: #6f7784;
      font-size: 13px; font-weight: 600;
      margin: 20px 0 17px;
    }
    .divider:before, .divider:after { content:""; flex:1; height:1px; background:#dfe5ec; }
    .school-email {
      height: 56px;
      border: 1.5px solid #3f7fb5;
      border-radius: 13px;
      background: #fff;
      color: #1c2635;
      font-family: inherit; font-size: 16px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      gap: 16px; width: 100%; cursor: pointer;
    }
    .school-email svg { width: 22px; height: 22px; color: #111827; }
    .create {
      text-align: center; margin: 17px 0 20px;
      font-size: 15px; color: #2e3440;
    }
    .create a { color: #4e8fc5; font-weight: 700; text-decoration: none; margin-left: 5px; }
    .note {
      min-height: 64px;
      border-radius: 15px;
      border: 1px solid #e0e7ef;
      background: #fbfcfd;
      display: flex; align-items: center;
      gap: 13px; padding: 12px 16px;
      box-shadow: 0 6px 16px rgba(15,23,42,.035);
    }
    .note svg { width: 28px; height: 28px; color: #4e8fc5; flex: 0 0 auto; }
    .note p { margin: 0; color: #606875; font-size: 13.5px; line-height: 1.38; }
    .note strong { color: #1f2937; font-weight: 800; }
    .home-indicator {
      width: 140px; height: 5px;
      border-radius: 999px;
      background: #0c0d0f;
      margin: 16px auto 8px;
    }
  </style>
</head>
